machine:
  name: pendulum_controller
  type: arm-generic-fdt
  cpus:
  - name: cpu0
    type: cortex-a15
peripherals:
- name: ram
  renode_type: Memory.MappedMemory
  address: '0x40000000'
  properties:
    size: '0x01000000'
- name: uart0
  renode_type: UART.PL011
  address: '0x09000000'

- name: actuator
  type: actuator
  address: '0x50000000'
  properties:
    node: 0
    region-size: 256
    topic-prefix: "firmware/control"
    transport: "hub0"

- name: sensor
  type: sensor
  address: '0x51000000'
  properties:
    node: 0
    region-size: 256
    topic-prefix: "sim/sensor"
    transport: "hub0"
    debug: true

topology:
  links: []
