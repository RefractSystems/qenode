name: PR Cleanup

# Deletes the ephemeral ci image pushed by ci-pr.yml when a PR closes.
# This keeps GHCR storage tidy — the SHA-tagged images are only needed while
# smoke tests are running against that specific commit.

on:
  pull_request:
    types: [closed]

jobs:
  delete-pr-ci-image:
    name: Delete ephemeral CI image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env
      - name: Delete PR ci image from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Nested GHCR packages use URL-encoded slashes in the API path.
          PACKAGE_NAME="${REPO#*/}/${{ env.VIRTMCU_CI_IMAGE }}"
          PACKAGE_ENCODED=$(echo -n "${PACKAGE_NAME}" | jq -sRr @uri)
          TAG="sha-${{ github.sha }}-amd64"

          # Determine API namespace (org vs. personal account).
          OWNER_TYPE=$(gh api "users/${OWNER}" --jq '.type' 2>/dev/null || echo "User")
          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_BASE="orgs/${OWNER}"
          else
            API_BASE="users/${OWNER}"
          fi

          # Locate the version ID that carries this tag.
          VERSION_ID=$(gh api \
            "${API_BASE}/packages/container/${PACKAGE_ENCODED}/versions" \
            --paginate \
            --jq ".[] | select(.metadata.container.tags | index(\"${TAG}\")) | .id" \
            2>/dev/null | head -1 || true)

          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "${API_BASE}/packages/container/${PACKAGE_ENCODED}/versions/${VERSION_ID}"
            echo "Deleted ${{ env.VIRTMCU_CI_IMAGE }}:${TAG} (version ${VERSION_ID})"
          else
            echo "${{ env.VIRTMCU_CI_IMAGE }}:${TAG} not found in GHCR — already cleaned up or never pushed."
          fi
