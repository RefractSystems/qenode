name: CI (PR)

# Validates every pull request and merge-queue entry targeting main.
# Runs: lint, unit tests, QEMU build, smoke tests, coverage.
# Does NOT publish any images — that is ci-main.yml's job.
#
# Architecture matrix: amd64 only. arm64 is reserved for main-branch builds
# where the 40-min cross-compile cost is amortised over an actual release artifact.

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  VIRTMCU_DEVENV_IMAGE: virtmcu-devenv
  VIRTMCU_CI_IMAGE: virtmcu-ci
  PYTHON_VERSION: "3.13"
  VIRTMCU_STALL_TIMEOUT_MS: "120000"
  CI: "true"

# ── Selective Execution ───────────────────────────────────────────────────────

jobs:
  changes:
    name: Check for source changes
    runs-on: ubuntu-latest
    outputs:
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            expensive:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/**'
              - '.github/workflows/ci-pr.yml'

# ── Tier 1: Core Setup & Devenv Build ──────────────────────────────────────────

  build-devenv:
    name: Build Devenv Base
    needs: [changes]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local devenv image
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: default

# ── Tier 2: Lint & Unit Tests ──────────────────────────────────────────────

  tier-checks:
    name: Lint & Unit Tests
    needs: [changes, build-devenv]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Set up Workspace Trust
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load devenv from cache
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: devenv
          load: true

      - name: Tag local devenv image
        run: docker tag "${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_DEVENV_IMAGE }}:sha-${{ github.sha }}-amd64" "${{ env.VIRTMCU_DEVENV_IMAGE }}:${{ github.sha }}"

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo-ci-registry
            .ci-target
          key: cargo-tier1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tier1-${{ runner.os }}-

      - name: Setup Cache Directories
        run: |
          mkdir -p "$HOME/.cargo-ci-registry"
          mkdir -p .ci-target

      - name: Run Tier 1 Checks (Lint, Build, Unit)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-target:/tmp/ci-target" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ${{ env.VIRTMCU_DEVENV_IMAGE }}:${{ github.sha }} \
            bash -c '
              set -e
              echo "::group::Static Analysis (Lint)"
              make dev-lint
              echo "::endgroup::"

              echo "::group::Build Packaging Tools"
              make build-tools
              echo "::endgroup::"

              echo "::group::Unit Tests"
              make dev-unit
              echo "::endgroup::"
            '

      - name: Run Unit Coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-target:/tmp/ci-target" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ${{ env.VIRTMCU_DEVENV_IMAGE }}:${{ github.sha }} \
            make dev-unit-coverage

      - name: Upload Unit Coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-results
          path: test-results/*-unit-coverage.xml


# ── Tier 2: Build QEMU ────────────────────────────────────────────────────────

  generate-matrix:
    name: Generate smoke test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env
      - name: Build matrix from smoke-domains.json
        id: gen
        run: |
          DOMAINS=$(cat .github/smoke-domains.json)
          MATRIX=$(jq -nc \
            --argjson domains "$DOMAINS" \
            '{
              arch: ["amd64"],
              sanitizer: ["standard", "asan"],
              domain: ($domains | map(.domain)),
              include: ([{arch: "amd64", os: "ubuntu-latest"}] + $domains)
            }')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-third-party:
    name: Build QEMU — amd64 (${{ matrix.sanitizer }})
    needs: [changes, build-devenv]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [standard, asan]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Check for pre-built third-party-base image
        run: |
          if [ "${{ matrix.sanitizer }}" == "standard" ]; then
            TAG="${{ env.VIRTMCU_IMAGE_REGISTRY }}/third-party-base:${{ env.THIRD_PARTY_CACHE_TAG }}-amd64"
          else
            TAG="${{ env.VIRTMCU_IMAGE_REGISTRY }}/third-party-base:${{ env.THIRD_PARTY_CACHE_TAG }}-asan-amd64"
          fi
          if docker manifest inspect "$TAG" >/dev/null 2>&1; then
            echo "QEMU_BASE_CACHE=hit" >> "$GITHUB_ENV"
            echo "third-party-base cache HIT — QEMU compile will be skipped ($TAG)"
          else
            echo "QEMU_BASE_CACHE=miss" >> "$GITHUB_ENV"
            echo "third-party-base cache MISS — patches changed or first build; full QEMU compile required"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # third-party-base is intentionally excluded from PR builds — only ci-main.yml
      # writes to the QEMU cache so experimental patch branches never warm the
      # shared cache. The ci target reads third-party-base via its cache-from list.
      - name: Build and push ci stage
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository && 'true' || 'false' }}
          CI: "true"
          THIRD_PARTY_CACHE_TAG: ${{ env.THIRD_PARTY_CACHE_TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: |
            ${{ matrix.sanitizer == 'standard' && 'third-party-base' || 'third-party-base-asan' }}
            ${{ matrix.sanitizer == 'standard' && 'ci' || 'ci-asan' }}
          load: true
          files: docker-bake.hcl

      - name: Verify QEMU binary
        run: |
          if [ "${{ matrix.sanitizer }}" == "standard" ]; then
            IMAGE="${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-amd64"
          else
            IMAGE="${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-asan-amd64"
          fi
          docker run --rm $IMAGE qemu-system-arm --version

# ── Tier 4: Smoke Tests (amd64 only) ─────────────────────────────────────────

  integration:
    name: ${{ matrix.category }} — ${{ matrix.name }} (${{ matrix.arch }}, ${{ matrix.sanitizer }})
    needs: [changes, build-third-party, tier-checks, generate-matrix]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load ci from cache
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "false"
          CI: "true"
          THIRD_PARTY_CACHE_TAG: ${{ env.THIRD_PARTY_CACHE_TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: ${{ matrix.sanitizer == 'standard' && 'ci' || 'ci-asan' }}
          load: true
          files: docker-bake.hcl

      - name: Tag ci image locally
        run: |
          if [ "${{ matrix.sanitizer }}" == "standard" ]; then
            SOURCE_IMAGE="${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-${{ matrix.arch }}"
          else
            SOURCE_IMAGE="${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-asan-${{ matrix.arch }}"
          fi
          docker tag "$SOURCE_IMAGE" "${{ env.VIRTMCU_CI_IMAGE }}:${{ github.sha }}"

      - name: Run ${{ matrix.name }}
        run: |
          mkdir -p coverage-data
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            -e VIRTMCU_USE_ASAN="${{ matrix.sanitizer == 'asan' && '1' || '0' }}" \
            -e VIRTMCU_STALL_TIMEOUT_MS="${{ matrix.sanitizer == 'asan' && '300000' || env.VIRTMCU_STALL_TIMEOUT_MS }}" \
            -e GCOV_PREFIX=/workspace/coverage-data \
            -e GCOV_PREFIX_STRIP=3 \
            ${{ env.VIRTMCU_CI_IMAGE }}:${{ github.sha }} \
            bash scripts/testing/run-integration.sh ${{ matrix.domain }}

      - name: Upload results and coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-domain-${{ matrix.domain }}-${{ matrix.arch }}-${{ matrix.sanitizer }}
          path: |
            test-results/
            coverage-data/
            tests/fixtures/guest_apps/*/results/
            **/*.log


# ── Tier 5: Coverage Reports ──────────────────────────────────────────────────

  peripheral-coverage:
    name: Peripheral C Coverage
    needs: [changes, integration]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load ci from cache
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "false"
          CI: "true"
          THIRD_PARTY_CACHE_TAG: ${{ env.THIRD_PARTY_CACHE_TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: ci
          load: true
          files: docker-bake.hcl

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-coverage
          pattern: results-domain-*-amd64-standard
          merge-multiple: true

      - name: Generate unified peripheral coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            ${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-amd64 \
            bash scripts/testing/run-peripheral-coverage.sh

      - name: Upload peripheral coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: peripheral-c-coverage
          path: test-results/

  firmware-coverage:
    name: Guest Firmware Coverage
    needs: [changes, build-third-party, tier-checks]
    if: needs.changes.outputs.expensive == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load ci from cache
        uses: docker/bake-action@v7
        env:
          ARCH: amd64
          IMAGE_TAG: sha-${{ github.sha }}
          PUSH_CACHE: "false"
          CI: "true"
          THIRD_PARTY_CACHE_TAG: ${{ env.THIRD_PARTY_CACHE_TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: ci
          load: true
          files: docker-bake.hcl

      - name: Run coverage analysis
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e PYTHONPATH=/workspace:/workspace/generated \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            ${{ env.VIRTMCU_IMAGE_REGISTRY }}/${{ env.VIRTMCU_CI_IMAGE }}:sha-${{ github.sha }}-amd64 \
            bash scripts/testing/run-integration-coverage.sh
