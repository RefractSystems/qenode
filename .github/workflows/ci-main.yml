name: CI (Main)

# Runs on every push to main and on version tags.
# Performs the full validation pipeline and then publishes all images to GHCR.
#
# Jobs are structured in six tiers:
#   1. lint + unit-tests       — fast, no QEMU
#   2. build-qemu              — build the Docker ci image (both amd64 + arm64)
#   3. publish-devenv     — after tier1, before build-qemu
#   4. smoke tests + coverage  — full matrix against the ci image
#
# The expensive QEMU build is cached via GitHub Actions Docker layer cache.
# First run is slow (~40 min); subsequent runs with unchanged patches/ and hw/
# are fast (~3 min, fully from cache).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CI_IMAGE: virtmcu-ci
  PYTHON_VERSION: "3.13"
  VIRTMCU_STALL_TIMEOUT_MS: "120000"
  CI: "true"

# ── Selective Execution ───────────────────────────────────────────────────────

jobs:
  changes:
    name: Check for source changes
    runs-on: ubuntu-latest
    outputs:
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            expensive:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!.github/**'
              - '.github/workflows/ci-main.yml'

# ── Tier 1: Core Setup & Devenv Build ──────────────────────────────────────────

  build-devenv:
    name: Build Devenv Base — ${{ matrix.arch }}
    needs: [changes]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — devenv (${{ matrix.arch }})
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          PUSH_CACHE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          targets: default
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

# ── Tier 2: Lint & Unit Tests ──────────────────────────────────────────────

  tier-checks:
    name: Lint & Unit Tests
    needs: [changes, build-devenv]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Set up Workspace Trust
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Pull devenv image
        run: |
          for i in {1..5}; do
            if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo-ci-registry
            .ci-target
            .cargo-cache
          key: cargo-tier1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tier1-${{ runner.os }}-

      - name: Setup Cache Directories
        run: |
          mkdir -p "$HOME/.cargo-ci-registry"
          mkdir -p .ci-target
          mkdir -p .cargo-cache

      - name: Run Tier 1 Checks (Lint, Build, Unit)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-target:/tmp/ci-target" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            bash -c '
              set -e
              echo "::group::Static Analysis (Lint)"
              make dev-lint
              echo "::endgroup::"

              echo "::group::Build Packaging Tools"
              make build-tools
              echo "::endgroup::"

              echo "::group::Unit Tests"
              make dev-unit
              echo "::endgroup::"
            '

      - name: Run Unit Coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo-ci-registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-target:/tmp/ci-target" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e CARGO_TARGET_DIR=/tmp/ci-target \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            make dev-unit-coverage

      - name: Upload Unit Coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-results
          path: test-results/*-unit-coverage.xml


# ── Tier 2: Build QEMU ────────────────────────────────────────────────────────

  setup:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      arches: ${{ steps.arches.outputs.arches }}
    steps:
      - name: Set target architectures
        id: arches
        run: echo 'arches=["amd64","arm64"]' >> "$GITHUB_OUTPUT"

  generate-matrix:
    name: Generate smoke test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env
      - name: Build matrix from smoke-domains.json
        id: gen
        run: |
          DOMAINS=$(cat .github/smoke-domains.json)
          MATRIX=$(jq -nc \
            --argjson domains "$DOMAINS" \
            '{
              arch: ["amd64","arm64"],
              sanitizer: ["standard", "asan"],
              domain: ($domains | map(.domain)),
              include: ([{arch: "amd64", os: "ubuntu-latest"}, {arch: "arm64", os: "ubuntu-24.04-arm"}] + $domains)
            }')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"


  merge-devenv:
    name: Merge Devenv Manifest
    needs: [build-devenv, tier-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — devenv
        id: meta-devenv
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest — devenv
        run: |
          TAGS=$(echo "${{ steps.meta-devenv.outputs.tags }}" | xargs -I {} echo "-t {}")
          ANNOTATIONS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ANNOTATIONS+=("--annotation" "index:$line")
            fi
          done <<< "${{ steps.meta-devenv.outputs.labels }}"
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} "${ANNOTATIONS[@]}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/devenv:sha-${{ github.sha }}-arm64

  merge-rust-builder:
    name: Merge Rust Builder Manifest
    needs: [build-devenv, tier-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — rust-builder
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/rust-builder
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Create and push manifest — rust-builder
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/rust-builder:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/rust-builder:sha-${{ github.sha }}-arm64

  merge-flatcc-builder:
    name: Merge FlatCC Builder Manifest
    needs: [build-devenv, tier-checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — flatcc-builder
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/flatcc-builder
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Create and push manifest — flatcc-builder
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | xargs -I {} echo "-t {}")
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/flatcc-builder:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/flatcc-builder:sha-${{ github.sha }}-arm64

  build-qemu:
    name: Build QEMU — ${{ matrix.arch }} (${{ matrix.sanitizer }})
    needs: [changes, setup, build-devenv]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.setup.outputs.arches) }}
        sanitizer: [standard, asan]
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        if: matrix.arch == 'amd64'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # qemu-base is built and pushed here on every main merge.
      # Its content-addressed tag (QEMU_VERSION + patches hash) means
      # Docker skips the 40-minute compile when nothing changed.
      - name: Build and push ci stage
        uses: docker/bake-action@v7
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: sha-${{ github.sha }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          PUSH_CACHE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QEMU_CACHE_TAG: ${{ env.QEMU_CACHE_TAG }}
        with:
          targets: |
            ${{ matrix.sanitizer == 'standard' && 'qemu-base' || 'qemu-base-asan' }}
            ${{ matrix.sanitizer == 'standard' && 'ci' || 'ci-asan' }}
          push: true
          files: |
            docker-bake.hcl
            ${{ startsWith(github.ref, 'refs/heads/') && 'docker-bake-latest.hcl' || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'docker-bake-release.hcl' || '' }}

      - name: Verify QEMU binary
        run: |
          if [ "${{ matrix.sanitizer }}" == "standard" ]; then
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-${{ matrix.arch }}"
          else
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-asan-${{ matrix.arch }}"
          fi
          docker run --rm $IMAGE qemu-system-arm --version

  merge-ci:
    name: Merge CI Manifest
    needs: [build-qemu]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — ci
        id: meta-ci
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest — ci
        run: |
          TAGS=$(echo "${{ steps.meta-ci.outputs.tags }}" | xargs -I {} echo "-t {}")
          ANNOTATIONS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ANNOTATIONS+=("--annotation" "index:$line")
            fi
          done <<< "${{ steps.meta-ci.outputs.labels }}"
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} "${ANNOTATIONS[@]}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-arm64

  merge-ci-asan:
    name: Merge CI ASan Manifest
    needs: [build-qemu]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — ci-asan
        id: meta-ci-asan
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci
          flavor: |
            suffix=-asan
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest — ci-asan
        run: |
          TAGS=$(echo "${{ steps.meta-ci-asan.outputs.tags }}" | xargs -I {} echo "-t {}")
          ANNOTATIONS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ANNOTATIONS+=("--annotation" "index:$line")
            fi
          done <<< "${{ steps.meta-ci-asan.outputs.labels }}"
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} "${ANNOTATIONS[@]}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-asan-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-asan-arm64

  merge-base:
    name: Merge Base Manifest
    needs: [build-qemu]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — base
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest — base
        run: |
          TAGS=$(echo "${{ steps.meta-base.outputs.tags }}" | xargs -I {} echo "-t {}")
          ANNOTATIONS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ANNOTATIONS+=("--annotation" "index:$line")
            fi
          done <<< "${{ steps.meta-base.outputs.labels }}"
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} "${ANNOTATIONS[@]}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/base:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/base:sha-${{ github.sha }}-arm64

  merge-toolchain:
    name: Merge Toolchain Manifest
    needs: [build-qemu]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata — toolchain
        id: meta-toolchain
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/toolchain
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest — toolchain
        run: |
          TAGS=$(echo "${{ steps.meta-toolchain.outputs.tags }}" | xargs -I {} echo "-t {}")
          ANNOTATIONS=()
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ANNOTATIONS+=("--annotation" "index:$line")
            fi
          done <<< "${{ steps.meta-toolchain.outputs.labels }}"
          # shellcheck disable=SC2086
          docker buildx imagetools create ${TAGS} "${ANNOTATIONS[@]}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/toolchain:sha-${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/toolchain:sha-${{ github.sha }}-arm64

# ── Tier 3: Publish Environment Images (Parallel Path) ───────────────────────

  integration:
    name: ${{ matrix.category }} — ${{ matrix.name }} (${{ matrix.arch }}, ${{ matrix.sanitizer }})
    needs: [changes, build-qemu, tier-checks, generate-matrix]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Pull ci image
        run: |
          if [ "${{ matrix.sanitizer }}" == "standard" ]; then
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-${{ matrix.arch }}"
          else
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-asan-${{ matrix.arch }}"
          fi
          for i in {1..5}; do
            if docker pull "$IMAGE"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "$IMAGE" "${{ env.CI_IMAGE }}:${{ github.sha }}"

      - name: Run ${{ matrix.name }}
        run: |
          mkdir -p coverage-data
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            -e VIRTMCU_USE_ASAN="${{ matrix.sanitizer == 'asan' && '1' || '0' }}" \
            -e VIRTMCU_STALL_TIMEOUT_MS="${{ matrix.sanitizer == 'asan' && '300000' || env.VIRTMCU_STALL_TIMEOUT_MS }}" \
            -e GCOV_PREFIX=/workspace/coverage-data \
            -e GCOV_PREFIX_STRIP=3 \
            ${{ env.CI_IMAGE }}:${{ github.sha }} \
            bash scripts/testing/run-integration.sh ${{ matrix.domain }}

      - name: Upload results and coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-domain-${{ matrix.domain }}-${{ matrix.arch }}-${{ matrix.sanitizer }}
          path: |
            test-results/
            coverage-data/

# ── Tier 5: Coverage Reports ──────────────────────────────────────────────────

  peripheral-coverage:
    name: Peripheral C Coverage
    needs: [changes, integration]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Pull ci image
        run: |
          for i in {1..5}; do
            if docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-amd64"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-amd64" "${{ env.CI_IMAGE }}:${{ github.sha }}"

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-coverage
          pattern: results-domain-*-amd64-standard
          merge-multiple: true

      - name: Generate unified peripheral coverage
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e USER=vscode \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            ${{ env.CI_IMAGE }}:${{ github.sha }} \
            bash scripts/testing/run-peripheral-coverage.sh

      - name: Upload peripheral coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: peripheral-c-coverage
          path: test-results/

  firmware-coverage:
    name: Guest Firmware Coverage
    needs: [changes, build-qemu, tier-checks]
    if: needs.changes.outputs.expensive == 'true' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup VirtMCU Environment
        uses: ./.github/actions/setup-virtmcu-env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Pull ci image
        run: |
          for i in {1..5}; do
            if docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-amd64"; then
              break
            fi
            sleep 15
            if [ "$i" -eq 5 ]; then exit 1; fi
          done
          docker tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/ci:sha-${{ github.sha }}-amd64" "${{ env.CI_IMAGE }}:${{ github.sha }}"

      - name: Run coverage analysis
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e GH_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e PYTHONPATH=/workspace:/workspace/generated \
            -e VIRTMCU_STALL_TIMEOUT_MS \
            -e VIRTMCU_USE_PREBUILT_QEMU=1 \
            ${{ env.CI_IMAGE }}:${{ github.sha }} \
            bash scripts/testing/run-integration-coverage.sh

# ── Tier 6: Publish Runtime (after validation) ──────────────────────────────
