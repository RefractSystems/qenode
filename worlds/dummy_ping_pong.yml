machine:
  name: pinger
  type: arm-generic-fdt
  cpus:
    - name: cpu0
      type: cortex-a15

peripherals:
  - name: ram
    renode_type: Memory.MappedMemory
    address: '0x40000000'
    properties:
      size: '0x01000000'

  - name: pl011
    renode_type: UART.PL011
    address: '0x09000000'
    properties:
      size: '0x1000'

  - name: dummy
    type: rust-dummy
    address: '0x09005000'
    properties:
      size: '0x1000'
      node-id: '0'
      topic: 'dummy_bus'

---
machine:
  name: ponger
  type: arm-generic-fdt
  cpus:
    - name: cpu0
      type: cortex-a15

peripherals:
  - name: ram
    renode_type: Memory.MappedMemory
    address: '0x40000000'
    properties:
      size: '0x01000000'

  - name: pl011
    renode_type: UART.PL011
    address: '0x09000000'
    properties:
      size: '0x1000'

  - name: dummy
    type: rust-dummy
    address: '0x09005000'
    properties:
      size: '0x1000'
      node-id: '1'
      topic: 'dummy_bus'

---
topology:
  links:
    - type: dummy
      nodes: ['0', '1']
