nodes:
  - machine:
      name: pinger
      type: arm-generic-fdt
      cpus:
        - name: cpu0
          type: cortex-a15
    peripherals:
      - name: ram
        renode_type: Memory.MappedMemory
        address: '0x40000000'
        properties:
          size: '0x01000000'
      - name: pl011
        renode_type: UART.PL011
        address: '0x09000000'
        properties:
          size: 0x1000
      - name: reference_peripheral
        type: reference-peripheral
        address: none
        properties:
          svd: hw/defs/reference.svd
          size: 0x1000
          node-id: 0
          topic: 'reference_bus'
          transport: "hub0"

  - machine:
      name: ponger
      type: arm-generic-fdt
      cpus:
        - name: cpu0
          type: cortex-a15
    peripherals:
      - name: ram
        renode_type: Memory.MappedMemory
        address: '0x40000000'
        properties:
          size: '0x01000000'
      - name: pl011
        renode_type: UART.PL011
        address: '0x09000000'
        properties:
          size: 0x1000
      - name: reference_peripheral
        type: reference-peripheral
        address: none
        properties:
          svd: hw/defs/reference.svd
          node-id: 1
          topic: 'reference_bus'
          transport: "hub0"

topology:
  nodes:
    - name: '0'
    - name: '1'
  links:
    - type: reference-link
      nodes: ['0', '1']
