---
# worlds/pendulum.yml
# Example physics overlay for the standalone virtmcu docker-compose.yml
# This overrides the cyber-node to run a slaved-clock firmware and adds a physics node.
services:
  cyber-node:
    command: [
      "/app/target/release/virtmcu-run",
      "--yaml",
      "/app/tests/fixtures/guest_apps/yaml_boot/test_board.yaml",
      "-kernel",
      "/app/tests/fixtures/guest_apps/boot_arm/hello.elf",
      "-device",
      "virtmcu-clock,mode=suspend,node=0,coordinated=true,router=tcp/zenoh-router:7447"
    ]

  physical-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - virtmcu-net
    environment:
      ZENOH_CONNECT: tcp/zenoh-router:7447
      RUST_LOG: info
    depends_on:
      zenoh-router:
        condition: service_healthy
    volumes:
      - ../target:/app/target:ro
    command: [
      "/app/target/release/virtmcu-physical-node",
      "--transport", "zenoh",
      "--connect", "tcp/zenoh-router:7447",
      "--node-id", "0",
      "--delta-ns", "1000000",
      "--plant", "tick-only"
    ]

networks:
  virtmcu-net: {}
