---
services:
  cyber-node:
    command: [
      "/app/target/release/virtmcu-run",
      "--yaml",
      "/app/tests/fixtures/guest_apps/pendulum_controller/board.yaml",
      "-kernel",
      "/app/tests/fixtures/guest_apps/pendulum_controller/controller.elf",
      "-global", "actuator.transport=hub0",
      "-global", "sensor.transport=hub0",
      "-device",
      "virtmcu-clock,mode=suspend,node=0,coordinated=true,router=tcp/zenoh-router:7447,federation_id=compose-run"
    ]

  physical-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - virtmcu-net
    environment:
      ZENOH_CONNECT: tcp/zenoh-router:7447
      RUST_LOG: info
      VIRTMCU_FEDERATION_ID: "compose-run"
    depends_on:
      zenoh-router:
        condition: service_healthy
    volumes:
      - ../target:/app/target:ro
      - /dev/shm:/dev/shm
    command: [
      "/app/target/release/virtmcu-physical-node",
      "--transport", "zenoh",
      "--connect", "tcp/zenoh-router:7447",
      "--node-id", "0",
      "--delta-ns", "1000000",
      "--timeout-ms", "30000",
      "--plant", "embedded",
      "--n-sensors", "1",
      "--n-actuators", "1"
    ]

  mock-physics:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - virtmcu-net
    depends_on:
      physical-node:
        condition: service_started
    volumes:
      - ../target:/app/target:ro
      - /dev/shm:/dev/shm
    command: ["/app/target/release/pendulum-mock-physics", "--node-id", "0", "--delta-ns", "1000000"]

networks:
  virtmcu-net: {}
